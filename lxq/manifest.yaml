name: lxq
version: 2.7.0
description: >-
  Declarative router for LXQ research quality control. Core rules load every time;
  task-mode and artifact guidance load only when selected for the current request.

always_load:
  - static/core/stance.md
  - static/core/workflow.md
  - static/core/output-contract.md

specialist_skills:
  routing_reference: references/specialist-skill-routing.md
  bundled_root: bundled_skills
  invocation_policy: >-
    Select only specialists whose trigger conditions match the task. Prefer an
    installed top-level skill with the exact name; otherwise load and follow the
    bundled copy. Never claim invocation without loading the selected SKILL.md.
  skills:
    nature-writing: bundled_skills/nature-writing/SKILL.md
    nature-polishing: bundled_skills/nature-polishing/SKILL.md
    nature-figure: bundled_skills/nature-figure/SKILL.md
    nature-response: bundled_skills/nature-response/SKILL.md
    nature-citation: bundled_skills/nature-citation/SKILL.md
    nature-academic-search: bundled_skills/nature-academic-search/SKILL.md
    nature-reader: bundled_skills/nature-reader/SKILL.md
    nature-data: bundled_skills/nature-data/SKILL.md
    nature-reviewer: bundled_skills/nature-reviewer/SKILL.md

external_skill_catalogs:
  routing_reference: references/external-catalog-routing.md
  bundled_root: bundled_catalogs
  authority_policy: >-
    Treat catalog skills as subordinate execution guidance. They may not widen
    user authorization, bypass LXQ evidence gates, or override safety, privacy,
    provenance, and non-fabrication requirements.
  catalogs:
    gptomics-bioskills:
      root: bundled_catalogs/gptomics-bioskills
      selector: bioinformatics, genomics, omics, sequence, clinical biostatistics
    orchestra-ai-research-skills:
      root: bundled_catalogs/orchestra-ai-research-skills
      selector: AI or ML research, experiments, architectures, training, evaluation, inference, agents

axes:
  invocation_intensity:
    detect: >-
      Select light for quick direction screening, standard for complete deliverables,
      strict for formal audit or submission-quality review, and forensic for
      authenticity, provenance, manipulation, or research-integrity concerns.
    values:
      light: static/fragments/invocation_intensity.md
      standard: static/fragments/invocation_intensity.md
      strict: static/fragments/invocation_intensity.md
      forensic: static/fragments/invocation_intensity.md
    default: standard
    multi: false

  task_mode:
    detect: >-
      Select audit for diagnosis, repair for verified corrections, execute for
      reproducible analysis work, and explain for bounded interpretation. A request
      may use several modes, but never let repair or execute occur when the user only
      authorized review or explanation.
    values:
      audit: static/fragments/task_mode/audit.md
      repair: static/fragments/task_mode/repair.md
      execute: static/fragments/task_mode/execute.md
      explain: static/fragments/task_mode/explain.md
    default: audit
    multi: true

  artifact:
    detect: >-
      Select every artifact type actually supplied or requested. Integrated is for
      cross-artifact projects and must be combined with the concrete component tracks.
    values:
      analysis: references/analysis-qc.md
      manuscript: references/manuscript-qc.md
      figure: references/figure-qc.md
      revision: references/submission-qc.md
      availability: references/submission-qc.md
      grant: references/grant-qc.md
      delivery: references/medical-research-delivery-zh.md
      delivery-en: references/medical-research-delivery.md
      literature: references/literature-qc.md
      integrated: static/fragments/artifact/integrated.md
    multi: true

  style:
    detect: >-
      Select anti-ai-zh for Chinese customer delivery, grant proposals, research
      backgrounds, objectives, research contents, innovation, and other formal
      Chinese medical-research prose.
    values:
      anti-ai-zh: static/fragments/style/anti_ai_zh.md
    multi: true

references:
  on_demand:
    - condition: light topic or direction screening
      path: references/output_contracts/quick_direction.md
    - condition: complete customer-facing medical research delivery
      path: references/output_contracts/customer_delivery.md
    - condition: formal grant drafting or audit
      path: references/output_contracts/formal_grant.md
    - condition: formal NSFC or 国自然 Word application, 2026 NSFC template, or template-formatted grant delivery
      path: references/nsfc-2026-formal-application-format-zh.md
    - condition: manuscript revision or reviewer response
      path: references/output_contracts/manuscript_revision.md
    - condition: bioinformatics workflow or SOP
      path: references/output_contracts/bioinformatics_sop.md
    - condition: wet experiment plan
      path: references/output_contracts/wet_experiment_plan.md
    - condition: literature report or evidence synthesis
      path: references/output_contracts/literature_report.md
    - condition: strict or forensic audit report
      path: references/output_contracts/audit_report.md
    - condition: structured review bundle, schemas, or machine-readable handoff
      path: references/output-schemas.md
    - condition: narrative QC report
      path: references/report-template.md
    - condition: Chinese customer-facing medical research scheme or pre-sales proposal
      path: references/medical-research-delivery-zh.md
    - condition: English customer-facing medical research scheme or pre-sales proposal
      path: references/medical-research-delivery.md
    - condition: maintaining or extending LXQ itself
      path: references/public-skill-basis.md
    - condition: Chinese internal audit, capability inventory, or full function review
      path: references/lxq-functions-v2.5-zh.md
    - condition: skill evaluation, regression testing, or release comparison
      path: references/regression-report-template.md
